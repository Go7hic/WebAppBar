name: WebAppBar
options:
  bundleIdPrefix: com.webappbar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  WebAppBar:
    type: application
    platform: macOS
    sources:
      - path: WebAppBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.webappbar.app
        PRODUCT_NAME: WebAppBar
        INFOPLIST_FILE: WebAppBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: WebAppBar/WebAppBar.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: WebAppBar/Info.plist
    entitlements:
      path: WebAppBar/WebAppBar.entitlements
